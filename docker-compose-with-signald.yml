version: '3.8'

services:
  signald:
    image: signald/signald:latest
    container_name: signald
    volumes:
      - signald-data:/signald
    restart: unless-stopped
    # Expose signald socket via volume
    command: ["--socket", "/signald/signald.sock"]

  signalbot:
    build: .
    container_name: signalbot
    depends_on:
      - signald
    volumes:
      - ./config.yaml:/data/config.yaml:ro
      - signalbot-data:/data
      - signald-data:/signald:ro
    environment:
      - SIGNALD_SOCKET=/signald/signald.sock
      - SIGNALBOT_LOG_FILE=/data/bot.log
    restart: unless-stopped

volumes:
  signald-data:
  signalbot-data:
