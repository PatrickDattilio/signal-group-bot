name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Gradle test
        working-directory: signalbot-kt
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t signalbot:test .

      - name: Verify image contents
        run: |
          docker run --rm signalbot:test sh -c 'test -f /app/signalbot.jar && test -x /app/entrypoint.sh && test -f /usr/local/bin/signal-cli'
