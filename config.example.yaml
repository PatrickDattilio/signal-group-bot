# Copy to config.yaml and fill in your values.
# The bot uses the moderator Signal account (linked with signal-cli) to read
# pending join requests and send DMs.

# signal-cli daemon connection (required for bot to connect)
# Run: signal-cli -u +NUMBER daemon --socket
# On Windows: use TCP, e.g. localhost:7583 (see SIGNAL_CLI_SETUP.md)
# On Linux: Unix socket path or host:port for TCP
signal_cli:
  socket_path: "localhost:7583"  # TCP on Windows; or /path/to/socket on Linux
  # cli_config_path: "C:\\Users\\You\\AppData\\Roaming\\signal-cli-cli"  # Only with try_cli_fallback_for_approve: true — duplicate data dir if JSON-RPC updateGroup fails
  # try_cli_fallback_for_approve: false

# The Signal account (admin of the group). E.164 format, e.g. +12025551234
account: "+1234567890"

# Main group's ID (base64). This is the group where join requests appear; Approve adds the member here first. Get via: python main.py list-groups
group_id: "YOUR_GROUP_ID_BASE64"

# Message sent to each user when they appear in the pending queue.
# You can use template variables in {{variable}} format:
#   {{timestamp}}      - Current Unix timestamp
#   {{date}}           - Current date (YYYY-MM-DD)
#   {{time}}           - Current time (HH:MM:SS)
#   {{datetime}}       - Current date and time
#   {{member_uuid}}    - Member's UUID
#   {{member_number}}  - Member's phone number
message: |
  Thanks for requesting to join! You'll be approved shortly.
  Please read our group rules: [link if any]
  
  Request received: {{datetime}}

# Optional: message sent when the same user is messaged again after cooldown (e.g. still in queue).
# If omitted, the same "message" above is sent again. Supports same {{variable}} templates.
# message_follow_up: |
#   We're still reviewing your request. You'll hear from us soon.
#   Last check: {{datetime}}

# Optional: when using the Web UI, after approving in the main group, the member is also added to these groups (base64 IDs). Run python main.py list-groups to see IDs and names.
# approve_add_to_group_id: "SECOND_GROUP_ID_BASE64"
# approve_add_to_group_id_2: "THIRD_GROUP_ID_BASE64"

# Optional: message sent to the member right before approving (Web UI only). Same {{variable}} templates as message.
# approve_rules_message: |
#   Please read our group rules: [link]. Welcome! Approved at {{datetime}}.

# Approval mode: "manual" (bot only sends message; you approve in Signal app)
# or "automatic" (bot sends message then calls approve_membership).
approval_mode: manual

# Optional: seconds to wait after sending the message before auto-approving (only if approval_mode: automatic).
auto_approve_delay_seconds: 0

# Optional: do not send the same user another message within this many seconds (cooldown).
cooldown_seconds: 86400

# How often to check for new pending members (seconds).
poll_interval_seconds: 120

# Optional: Filtering and approval rules
filters:
  # Allowlist: if enabled, only these members will be approved
  # Supports wildcards: * (any chars), ? (single char)
  allowlist_enabled: false
  allowlist:
    # - "+1234*"        # Allow all numbers starting with +1234
    # - "uuid-pattern*" # Allow UUIDs matching pattern
  
  # Blocklist: these members will never be approved (takes precedence)
  blocklist:
    # - "+15555551234"  # Block specific number
    # - "*spam*"        # Block any UUID/number containing "spam"
  
  # Rate limiting: prevent spam from same user
  rate_limit:
    enabled: false
    max_requests: 10      # Max join requests
    window_seconds: 3600  # Within this time window
