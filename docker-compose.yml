# Minimal example: Kotlin app + signal-cli in the image (see Dockerfile + docker/entrypoint.sh).
# Mount config and a persistent /data volume. Do not use legacy signald socket paths.

version: '3.8'

services:
  signalbot:
    build: .
    container_name: signalbot
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - ./config.yaml:/data/config.yaml:ro
      - signalbot-data:/data
    environment:
      - PORT=5000
      # Admin UI + polling bot (omit or set ui for UI-only)
      - SIGNALBOT_MODE=run
      - SIGNALBOT_LOG_LEVEL=INFO
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  signalbot-data:
    driver: local
